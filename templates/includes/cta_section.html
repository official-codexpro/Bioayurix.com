    <div class="relative max-w-6xl mx-auto px-6">

        <div class="flex flex-col lg:flex-row items-center justify-between gap-8 text-white">

            <!-- Text -->
            <div>
                <h2 class="text-3xl lg:text-4xl font-extrabold leading-tight">

                </a>

                    class="px-8 py-3 border border-white/30 rounded-xl hover:bg-white hover:text-[#0b2c3d] transition duration-300">
