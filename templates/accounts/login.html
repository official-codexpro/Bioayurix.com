{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Bioayurix{% endblock %}

{% block content %}
<section class="bg-gradient-to-b from-white to-teal-50/30 py-20 mt-16">
    <div class="max-w-md mx-auto px-6">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900">Welcome Back</h1>
            <p class="text-gray-600 mt-2">Login to your Bioayurix account</p>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-8">
            <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                {% csrf_token %}

                <div class="space-y-5">
                    <div>
                        <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="you@example.com">
                    </div>

                    <div>
                        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password" name="password" required
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-semibold mt-6 transition shadow-md">
                    Login
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-6">
                Don't have an account?
                <a href="{% url 'signup' %}" class="text-teal-600 font-semibold hover:underline">Sign Up</a>
            </p>
        </div>

    </div>
</section>
{% endblock %}
