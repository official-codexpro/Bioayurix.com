{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up - Bioayurix{% endblock %}

{% block content %}
<section class="bg-gradient-to-b from-white to-teal-50/30 py-20 mt-16">
    <div class="max-w-md mx-auto px-6">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900">Create Account</h1>
            <p class="text-gray-600 mt-2">Join Bioayurix for a healthier you</p>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-8">
            <form method="POST" action="{% url 'signup' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                {% csrf_token %}

                <div class="space-y-5">
                    <div>
                        <label for="full_name" class="text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="Enter your full name">
                    </div>

                    <div>
                        <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="you@example.com">
                    </div>

                    <div>
                        <label for="phone" class="text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="tel" id="phone" name="phone"
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                        >
                    </div>

                    <div>
                        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password" name="password" required minlength="6"
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="At least 6 characters">
                    </div>

                    <div>
                        <label for="confirm_password" class="text-sm font-medium text-gray-700">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                            class="w-full mt-2 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:outline-none"
                            placeholder="Confirm your password">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-semibold mt-6 transition shadow-md">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-6">
                Already have an account?
                <a href="{% url 'login' %}" class="text-teal-600 font-semibold hover:underline">Login</a>
            </p>
        </div>

    </div>
</section>
{% endblock %}
